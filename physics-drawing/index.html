<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Physics Drawing | Cool Demos</title>
  <meta name="description" content="Physics Drawing - Draw shapes that fall, bounce, and interact">
  <meta name="author" content="Sabah HM">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <a href="../index.html" class="back-btn" title="Back to Cool Demos">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
      <path d="M19 12H5M12 19l-7-7 7-7"/>
    </svg>
  </a>

  <div class="container">
    <header class="header">
      <h1 class="title">Physics Drawing</h1>
      <p class="subtitle">Draw & Drop</p>
    </header>

    <div class="canvas-wrapper">
      <canvas id="physicsCanvas"></canvas>
      <div class="stats">
        Objects: <span id="objectCount">0</span>
      </div>
    </div>

    <div class="controls">
      <div class="control-group">
        <button id="clearBtn" class="btn btn-primary">Clear All</button>
        <button id="dropBtn" class="btn">Drop All</button>
        <button id="shakeBtn" class="btn">Shake</button>
      </div>

      <div class="control-group">
        <label class="control-label">Gravity</label>
        <input type="range" id="gravitySlider" min="0" max="2" step="0.1" value="0.5" class="slider">
      </div>

      <div class="control-group">
        <label class="control-label">Bounce</label>
        <input type="range" id="bounceSlider" min="0" max="1" step="0.1" value="0.6" class="slider">
      </div>
    </div>

    <div class="info">
      <p><strong>Draw shapes</strong> then release to watch them fall with physics</p>
    </div>

    <footer class="footer">
      <p>Made by <a href="https://www.linkedin.com/in/sabah-hm/" target="_blank" rel="noopener">Sabah HM</a></p>
    </footer>
  </div>

  <script src="script.js"></script>
</body>
</html>
