<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Generative Art | Cool Demos</title>
  <meta name="description" content="Generative Art - Infinite evolving patterns and procedural artwork">
  <meta name="author" content="Sabah HM">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <a href="../index.html" class="back-btn" title="Back to Cool Demos">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
      <path d="M19 12H5M12 19l-7-7 7-7"/>
    </svg>
  </a>

  <div class="container">
    <header class="header">
      <h1 class="title">Generative Art</h1>
      <p class="subtitle">Procedural Patterns</p>
    </header>

    <div class="canvas-wrapper">
      <canvas id="artCanvas"></canvas>
      <div class="stats">
        Pattern: <span id="patternName">Flow Field</span>
      </div>
    </div>

    <div class="controls">
      <div class="control-group">
        <button id="regenerateBtn" class="btn btn-primary">Generate New</button>
        <button id="pauseBtn" class="btn">Pause</button>
        <button id="saveBtn" class="btn">Save Image</button>
      </div>

      <div class="control-group">
        <label class="control-label">Pattern</label>
        <button class="pattern-btn active" data-pattern="flow">Flow Field</button>
        <button class="pattern-btn" data-pattern="spirograph">Spirograph</button>
        <button class="pattern-btn" data-pattern="waves">Waves</button>
        <button class="pattern-btn" data-pattern="cells">Cells</button>
      </div>

      <div class="control-group">
        <label class="control-label">Speed</label>
        <input type="range" id="speedSlider" min="0.5" max="3" step="0.1" value="1" class="slider">
      </div>
    </div>

    <div class="info">
      <p><strong>Watch patterns evolve</strong> or click Generate New for fresh randomness</p>
    </div>

    <footer class="footer">
      <p>Made by <a href="https://www.linkedin.com/in/sabah-hm/" target="_blank" rel="noopener">Sabah HM</a></p>
    </footer>
  </div>

  <script src="script.js"></script>
</body>
</html>
