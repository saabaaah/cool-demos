<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Particle Playground | Cool Demos</title>
  <meta name="description" content="Particle Playground - Create explosions, forces, and mesmerizing particle effects">
  <meta name="author" content="Sabah HM">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <a href="../index.html" class="back-btn" title="Back to Cool Demos">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
      <path d="M19 12H5M12 19l-7-7 7-7"/>
    </svg>
  </a>

  <canvas id="particles"></canvas>

  <div class="overlay">
    <h1 class="title">Particle Playground</h1>
    <p class="subtitle">Click to explode • Hold to attract • Right-click to repel</p>
  </div>

  <div class="controls">
    <div class="control-group">
      <label class="control-label">Mode</label>
      <div class="toggle-group">
        <button class="toggle-btn active" data-mode="explode">Explode</button>
        <button class="toggle-btn" data-mode="attract">Attract</button>
        <button class="toggle-btn" data-mode="repel">Repel</button>
        <button class="toggle-btn" data-mode="spray">Spray</button>
      </div>
    </div>
    <div class="control-group">
      <label class="control-label">Gravity</label>
      <input type="range" id="gravitySlider" min="0" max="1" step="0.05" value="0.1" class="slider">
    </div>
    <div class="control-group">
      <label class="control-label">Friction</label>
      <input type="range" id="frictionSlider" min="0.9" max="1" step="0.005" value="0.98" class="slider">
    </div>
    <button id="clearBtn" class="btn">Clear</button>
  </div>

  <div class="stats">
    <span>Particles: <span id="particleCount">0</span></span>
  </div>

  <footer class="footer">
    <p>Made by <a href="https://www.linkedin.com/in/sabah-hm/" target="_blank" rel="noopener">Sabah HM</a></p>
  </footer>

  <script src="script.js"></script>
</body>
</html>
