<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Rain on Window | Cool Demos</title>
  <meta name="description" content="Rain on Window - Peaceful raindrops running down glass">
  <meta name="author" content="Sabah HM">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <a href="../index.html" class="back-btn" title="Back to Cool Demos">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
      <path d="M19 12H5M12 19l-7-7 7-7"/>
    </svg>
  </a>

  <canvas id="rain"></canvas>

  <div class="overlay">
    <h1 class="title">Rain on Window</h1>
    <p class="subtitle">Relax and watch the rain</p>
  </div>

  <div class="controls">
    <div class="control-group">
      <label class="control-label">Intensity</label>
      <input type="range" id="intensitySlider" min="10" max="200" value="80" class="slider">
    </div>
    <div class="control-group">
      <label class="control-label">Wind</label>
      <input type="range" id="windSlider" min="-5" max="5" step="0.5" value="1" class="slider">
    </div>
    <div class="control-group">
      <label class="control-label">Drop Size</label>
      <input type="range" id="sizeSlider" min="1" max="5" step="0.5" value="2" class="slider">
    </div>
  </div>

  <footer class="footer">
    <p>Made by <a href="https://www.linkedin.com/in/sabah-hm/" target="_blank" rel="noopener">Sabah HM</a></p>
  </footer>

  <script src="script.js"></script>
</body>
</html>
