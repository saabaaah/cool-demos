<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cloth Simulation | Cool Demos</title>
  <meta name="description" content="Cloth Simulation - Drag and tear realistic fabric">
  <meta name="author" content="Sabah HM">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <a href="../index.html" class="back-btn" title="Back to Cool Demos">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
      <path d="M19 12H5M12 19l-7-7 7-7"/>
    </svg>
  </a>

  <div class="container">
    <header class="header">
      <h1 class="title">Cloth Simulation</h1>
      <p class="subtitle">Spring Physics</p>
    </header>

    <div class="canvas-wrapper">
      <canvas id="clothCanvas"></canvas>
      <div class="stats">
        Points: <span id="pointCount">0</span>
      </div>
    </div>

    <div class="controls">
      <div class="control-group">
        <button id="resetBtn" class="btn btn-primary">Reset</button>
        <button id="releaseBtn" class="btn">Release</button>
        <button id="windBtn" class="btn">Wind</button>
      </div>

      <div class="control-group">
        <label class="control-label">Gravity</label>
        <input type="range" id="gravitySlider" min="0" max="2" step="0.1" value="0.5" class="slider">
      </div>

      <div class="control-group">
        <label class="control-label">Stiffness</label>
        <input type="range" id="stiffnessSlider" min="0.5" max="1" step="0.05" value="0.9" class="slider">
      </div>
    </div>

    <div class="info">
      <p><strong>Drag to pull</strong> the cloth, click to tear it</p>
    </div>

    <footer class="footer">
      <p>Made by <a href="https://www.linkedin.com/in/sabah-hm/" target="_blank" rel="noopener">Sabah HM</a></p>
    </footer>
  </div>

  <script src="script.js"></script>
</body>
</html>
