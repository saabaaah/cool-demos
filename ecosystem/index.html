<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ecosystem | Cool Demos</title>
  <meta name="description" content="Ecosystem - Watch predators, prey, and plants compete for survival">
  <meta name="author" content="Sabah HM">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <a href="../index.html" class="back-btn" title="Back to Cool Demos">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
      <path d="M19 12H5M12 19l-7-7 7-7"/>
    </svg>
  </a>

  <div class="container">
    <header class="header">
      <h1 class="title">Ecosystem</h1>
      <p class="subtitle">Predator-Prey Dynamics</p>
    </header>

    <div class="canvas-wrapper">
      <canvas id="ecoCanvas"></canvas>
      <div class="stats">
        <span class="stat prey">Prey: <span id="preyCount">0</span></span>
        <span class="stat predator">Predators: <span id="predatorCount">0</span></span>
        <span class="stat plant">Plants: <span id="plantCount">0</span></span>
      </div>
    </div>

    <div class="controls">
      <div class="control-group">
        <button id="resetBtn" class="btn btn-primary">Reset</button>
        <button id="pauseBtn" class="btn">Pause</button>
      </div>

      <div class="control-group">
        <label class="control-label">Prey</label>
        <input type="range" id="preySlider" min="10" max="100" value="50" class="slider">
      </div>

      <div class="control-group">
        <label class="control-label">Predators</label>
        <input type="range" id="predatorSlider" min="1" max="20" value="5" class="slider">
      </div>

      <div class="control-group">
        <label class="control-label">Speed</label>
        <input type="range" id="speedSlider" min="1" max="5" value="2" class="slider">
      </div>
    </div>

    <div class="info">
      <p><strong>Green</strong> = Prey eat plants • <strong>Red</strong> = Predators hunt prey • Watch the balance</p>
    </div>

    <footer class="footer">
      <p>Made by <a href="https://www.linkedin.com/in/sabah-hm/" target="_blank" rel="noopener">Sabah HM</a></p>
    </footer>
  </div>

  <script src="script.js"></script>
</body>
</html>
