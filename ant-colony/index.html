<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ant Colony | Cool Demos</title>
  <meta name="description" content="Ant Colony - Watch ants find food using pheromone trails and emergent behavior">
  <meta name="author" content="Sabah HM">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <a href="../index.html" class="back-btn" title="Back to Cool Demos">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
      <path d="M19 12H5M12 19l-7-7 7-7"/>
    </svg>
  </a>

  <div class="container">
    <header class="header">
      <h1 class="title">Ant Colony</h1>
      <p class="subtitle">Emergent Foraging Behavior</p>
    </header>

    <div class="canvas-wrapper">
      <canvas id="antCanvas"></canvas>
      <div class="stats">
        <span>Ants: <span id="antCount">100</span></span>
        <span>Food: <span id="foodCount">0</span></span>
      </div>
    </div>

    <div class="controls">
      <div class="control-group">
        <button id="resetBtn" class="btn">Reset</button>
        <button id="foodBtn" class="btn active">+ Food</button>
        <button id="wallBtn" class="btn">+ Wall</button>
      </div>

      <div class="control-group">
        <label class="control-label">Ants</label>
        <input type="range" id="antSlider" min="20" max="300" value="100" class="slider">
        <span id="antValue" class="slider-value">100</span>
      </div>

      <div class="control-group">
        <label class="control-label">Pheromone</label>
        <input type="range" id="pheromoneSlider" min="0.9" max="0.999" step="0.001" value="0.99" class="slider">
      </div>

      <div class="control-group">
        <label class="control-label">Speed</label>
        <input type="range" id="speedSlider" min="1" max="5" value="2" class="slider">
      </div>
    </div>

    <div class="info">
      <p><strong>Click</strong> to place food or walls • Watch ants find efficient paths home</p>
    </div>

    <footer class="footer">
      <p>Made by <a href="https://www.linkedin.com/in/sabah-hm/" target="_blank" rel="noopener">Sabah HM</a></p>
    </footer>
  </div>

  <script src="script.js"></script>
</body>
</html>
