<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pathfinding | Cool Demos</title>
  <meta name="description" content="Pathfinding - Watch A* and Dijkstra algorithms solve mazes step by step">
  <meta name="author" content="Sabah HM">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <a href="../index.html" class="back-btn" title="Back to Cool Demos">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
      <path d="M19 12H5M12 19l-7-7 7-7"/>
    </svg>
  </a>

  <div class="container">
    <header class="header">
      <h1 class="title">Pathfinding</h1>
      <p class="subtitle">Algorithm Visualization</p>
    </header>

    <div class="canvas-wrapper">
      <canvas id="pathCanvas"></canvas>
      <div class="stats">
        <span>Visited: <span id="visitedCount">0</span></span>
        <span>Path: <span id="pathLength">0</span></span>
      </div>
    </div>

    <div class="controls">
      <div class="control-group">
        <button id="startBtn" class="btn btn-primary">Find Path</button>
        <button id="clearPathBtn" class="btn">Clear Path</button>
        <button id="clearAllBtn" class="btn">Clear All</button>
        <button id="mazeBtn" class="btn">Generate Maze</button>
      </div>

      <div class="control-group">
        <label class="control-label">Algorithm</label>
        <select id="algoSelect" class="select">
          <option value="astar">A* Search</option>
          <option value="dijkstra">Dijkstra</option>
          <option value="bfs">BFS</option>
          <option value="dfs">DFS</option>
        </select>
      </div>

      <div class="control-group">
        <label class="control-label">Speed</label>
        <input type="range" id="speedSlider" min="1" max="100" value="50" class="slider">
      </div>

      <div class="control-group">
        <label class="control-label">Tool</label>
        <div class="toggle-group">
          <button class="toggle-btn" data-tool="start">Start</button>
          <button class="toggle-btn" data-tool="end">End</button>
          <button class="toggle-btn active" data-tool="wall">Wall</button>
          <button class="toggle-btn" data-tool="erase">Erase</button>
        </div>
      </div>
    </div>

    <div class="info">
      <p><strong>Click/drag</strong> to draw walls • Set start and end points • Watch the algorithm search</p>
    </div>

    <footer class="footer">
      <p>Made by <a href="https://www.linkedin.com/in/sabah-hm/" target="_blank" rel="noopener">Sabah HM</a></p>
    </footer>
  </div>

  <script src="script.js"></script>
</body>
</html>
